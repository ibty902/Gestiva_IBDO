{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Clients</title>
    <link rel="stylesheet" href="{% static 'css/clients.css' %}">
</head>
<body>

<header>
    <h1>Gestion des Clients</h1>
</header>

<div class="container">

    <a href="{% url 'add_client' %}" class="btn-add">+ Ajouter Client</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nom</th>
                <th>Email</th>
                <th>Téléphone</th>
                <th>Ville</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
        {% for client in clients %}
            <tr>
                <td>{{ client.id }}</td>
                <td>{{ client.nom }}</td>
                <td>{{ client.email }}</td>
                <td>{{ client.telephone }}</td>
                <td>{{ client.ville }}</td>
                <td>
                    <form action="{% url 'delete_client' client.id %}" method="POST" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="delete">Supprimer</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
